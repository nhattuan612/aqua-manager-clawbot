name: aqua-manager-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release package
        run: bash deploy/package-release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aqua-manager-release
          path: |
            dist/*.tar.gz
            dist/*.sha256
